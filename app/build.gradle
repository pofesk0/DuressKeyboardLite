plugins {
id 'com.android.application'

}

android {
namespace "duress.keyboard.lite"
compileSdk 29

lint {
        checkReleaseBuilds false
    }

defaultConfig {  
    applicationId "duress.keyboard.lite"  
    minSdk 29
    targetSdk 36
    versionCode 1
    versionName "1.0"  
}  

buildTypes {  
    release {  
        minifyEnabled false  
        shrinkResources false  
         }  
}

}

dependencies {
implementation fileTree(dir: 'libs', include: ['*.jar'])
}
